  name: Publish to PyPI

  on:
    release:
      types: [published]

  jobs:
    publish:
      runs-on: ubuntu-latest
      environment: pypi           # create this environment in repo settings
      permissions:
        id-token: write           # enables OIDC trusted publishing (no token needed!)

      steps:
        - uses: actions/checkout@v4

        - uses: astral-sh/setup-uv@v4
          with:
            enable-cache: true

        - run: uv build

        - uses: pypa/gh-action-pypi-publish@release/v1
          # uses OIDC — no API token required when trusted publishing is configured
